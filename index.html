<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faeing</title>

  <meta name="description" content="Faeing은 농기계 문제를 흐름으로 파악하고, 고장 진단과 관리 방향을 정리하는 현장 기반 시스템입니다.">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Times New Roman", "Noto Sans KR", sans-serif;
      background: #f9faf7;
      color: #222;
      min-height: 100vh;
    }

    .navbar {
      height: 56px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      background: #F2F1EE;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .nav-home {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .nav-logo { height: 34px; }
    .nav-brand {
      font-size: 22px;
      letter-spacing: 0.08em;
    }

    .main-area {
      min-height: calc(100vh - 56px);
      padding: 42px 18px;
      display: flex;
      justify-content: center;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 820px;
    }

    .screen.active { display: block; }

    .eyebrow {
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.42);
      margin-bottom: 16px;
    }

    .main-title {
      text-align: center;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 500;
      margin-bottom: 14px;
      letter-spacing: -0.03em;
    }

    .main-desc {
      text-align: center;
      font-size: 16px;
      line-height: 1.7;
      color: rgba(0,0,0,0.58);
      margin-bottom: 38px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .card {
      min-height: 86px;
      padding: 22px 24px;
      border-radius: 22px;
      background: #F2F1EE;
      border: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .card:hover {
      background: #E9E7E1;
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 21px;
      font-weight: 500;
    }

    .card-sub {
      font-size: 13px;
      color: rgba(0,0,0,0.48);
      margin-top: 6px;
      line-height: 1.5;
    }

    .arrow {
      font-size: 24px;
      color: rgba(0,0,0,0.35);
    }

    .back-btn {
      border: none;
      background: transparent;
      font-size: 14px;
      color: rgba(0,0,0,0.55);
      margin-bottom: 22px;
      cursor: pointer;
    }

    .box {
      background: #fff;
      border-radius: 26px;
      padding: 30px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 12px 30px rgba(0,0,0,0.04);
    }

    .step-label {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: rgba(0,0,0,0.42);
      margin-bottom: 12px;
    }

    .step-title {
      font-size: 29px;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .step-desc {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(0,0,0,0.6);
      margin-bottom: 26px;
    }

    .option-list {
      display: grid;
      gap: 12px;
    }

    .choice-btn {
      width: 100%;
      padding: 18px 20px;
      border: none;
      border-radius: 18px;
      background: #F2F1EE;
      font-size: 17px;
      text-align: left;
      cursor: pointer;
    }

    .choice-btn:hover {
      background: #E9E7E1;
    }

    .progress {
      height: 6px;
      background: rgba(0,0,0,0.06);
      border-radius: 99px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #222;
      width: 0%;
      transition: 0.25s ease;
    }

    .mini-result {
      padding: 18px;
      background: #F9FAF7;
      border-radius: 18px;
      line-height: 1.7;
      color: rgba(0,0,0,0.68);
      margin-bottom: 24px;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 24px;
    }

    .tool-btn {
      border: 1px solid rgba(0,0,0,0.08);
      background: #F2F1EE;
      border-radius: 16px;
      padding: 15px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .panel {
      display: none;
      margin-top: 14px;
      padding: 18px;
      border-radius: 18px;
      background: #F9FAF7;
      border: 1px solid rgba(0,0,0,0.06);
      font-size: 15px;
      line-height: 1.8;
    }

    .panel.active { display: block; }

    .restart-btn {
      width: 100%;
      margin-top: 24px;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: #222;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .navbar {
        height: 54px;
        padding: 0 18px;
      }

      .nav-logo { height: 30px; }
      .nav-brand { font-size: 18px; }

      .main-area {
        padding: 32px 15px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .box {
        padding: 24px 18px;
        border-radius: 22px;
      }

      .step-title {
        font-size: 24px;
      }

      .tools {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="navbar">
    <div class="nav-home" onclick="goHome()">
      <img src="assets/images/logo.png" alt="Faeing" class="nav-logo">
      <span class="nav-brand">Faeing</span>
    </div>
  </header>

  <main class="main-area">

    <section id="homeScreen" class="screen active">
      <div class="eyebrow">AGRICULTURAL MACHINE DIAGNOSIS</div>
      <h1 class="main-title">어떤 문제가 발생했습니까?</h1>
      <p class="main-desc">
        증상을 선택하면 하나씩 확인하면서<br>
        문제 방향을 정리합니다.
      </p>
      <div class="grid" id="categoryGrid"></div>
    </section>

    <section id="questionScreen" class="screen">
      <button class="back-btn" onclick="goBack()">← 이전으로</button>
      <div class="box">
        <div class="step-label" id="questionLabel"></div>
        <h2 class="step-title" id="questionTitle"></h2>
        <p class="step-desc" id="questionDesc"></p>
        <div class="option-list" id="questionOptions"></div>
      </div>
    </section>

    <section id="checkScreen" class="screen">
      <button class="back-btn" onclick="goBack()">← 이전으로</button>
      <div class="box">
        <div class="progress">
          <div class="progress-bar" id="checkProgress"></div>
        </div>

        <div class="step-label" id="checkLabel"></div>
        <h2 class="step-title" id="checkTitle"></h2>
        <p class="step-desc" id="checkDesc"></p>

        <div class="option-list">
          <button class="choice-btn" onclick="answerCheck('정상')">정상입니다</button>
          <button class="choice-btn" onclick="answerCheck('이상')">이상이 있습니다</button>
          <button class="choice-btn" onclick="answerCheck('모름')">확인하기 어렵습니다</button>
        </div>
      </div>
    </section>

    <section id="finalScreen" class="screen">
      <button class="back-btn" onclick="goBack()">← 이전으로</button>
      <div class="box">
        <div class="step-label">정리된 방향</div>
        <h2 class="step-title" id="finalTitle"></h2>
        <p class="step-desc" id="finalDesc"></p>

        <div class="mini-result" id="finalSummary"></div>

        <div class="tools">
          <button class="tool-btn" onclick="togglePanel('principlePanel')">구조원리</button>
          <button class="tool-btn" onclick="togglePanel('maintenancePanel')">관리확인</button>
          <button class="tool-btn" onclick="togglePanel('supportPanel')">도움요청</button>
        </div>

        <div id="principlePanel" class="panel"></div>
        <div id="maintenancePanel" class="panel"></div>
        <div id="supportPanel" class="panel"></div>

        <button class="restart-btn" onclick="goHome()">처음으로 돌아가기</button>
      </div>
    </section>

  </main>

              "센서 커넥터가 빠지지 않았습니까?",
              "오일압력, 수온, 충전 상태가 실제로 정상입니까?",
              "고장코드 확인이 가능합니까?",
              "배선 흔들림에 따라 증상이 변합니까?"
            ]
          }
        },
        principle: "전기는 배터리에서 나와 퓨즈와 스위치를 거쳐 장치로 가고, 접지로 돌아와야 완성됩니다.",
        maintenance: "배터리 교체일, 퓨즈박스 침수, 커넥터 부식 이력을 확인하세요."
      },

      power: {
        title: "출력",
        sub: "힘 부족 · 매연 · 부하 이상",
        questions: [
          {
            q: "힘이 없는 증상이 언제 나타납니까?",
            d: "항상 부족한지, 작업 중에만 부족한지 나누는 것이 중요합니다.",
            options: [
              { text: "항상 힘이 없다", result: "always" },
              { text: "작업할 때만 힘이 없다", result: "load" },
              { text: "매연이 많이 난다", result: "smoke" }
            ]
          }
        ],
        results: {
          always: {
            title: "연료·흡기 흐름부터 봅니다.",
            desc: "항상 힘이 없으면 공기와 연료 흐름 부족 가능성이 있습니다.",
            checks: [
              "에어클리너가 막히지 않았습니까?",
              "연료필터 교체 시기가 지나지 않았습니까?",
              "연료라인에 에어 유입은 없습니까?",
              "터보 흡기호스 빠짐이나 균열은 없습니까?",
              "엔진오일 양이 정상입니까?"
            ]
          },
          load: {
            title: "부하 전달부와 연료 공급을 함께 봅니다.",
            desc: "작업 중 힘이 없으면 연료 공급, 클러치, 작업기 부하를 같이 봐야 합니다.",
            checks: [
              "작업기 깊이가 과하지 않습니까?",
              "연료필터 막힘 가능성은 없습니까?",
              "클러치 미끄러짐은 없습니까?",
              "PTO 전달부 이상음은 없습니까?",
              "냉각수 온도가 과하게 오르지 않습니까?"
            ]
          },
          smoke: {
            title: "연소 상태를 봅니다.",
            desc: "매연 색에 따라 흡기 부족, 연료 과다, 오일 연소 가능성을 나눕니다.",
            checks: [
              "검은 매연이면 에어클리너가 막히지 않았습니까?",
              "흰 연기면 예열이나 연료 분사 이상은 없습니까?",
              "푸른 연기면 오일 연소 가능성은 없습니까?",
              "인젝터 상태가 정상입니까?",
              "터보 오일 누유 가능성은 없습니까?"
            ]
          }
        },
        principle: "출력은 연료, 공기, 압축, 연소, 동력전달 흐름이 맞아야 나옵니다.",
        maintenance: "에어클리너, 연료필터, 엔진오일, 냉각수 관리 이력을 확인하세요."
      }
    };

    let state = {
      sessionId: null,
      categoryKey: null,
      resultKey: null,
      questionIndex: 0,
      checkIndex: 0,
      answers: [],
      checks: [],
      openedPanels: [],
      startedAt: null,
      updatedAt: null
    };

    let historyStack = [];

    const categoryGrid = document.getElementById("categoryGrid");

    function init() {
      categoryGrid.innerHTML = "";

      Object.keys(diagnosisData).forEach(key => {
        const data = diagnosisData[key];
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => startDiagnosis(key);
        card.innerHTML = `
          <div>
            <div class="card-title">${data.title}</div>
            <div class="card-sub">${data.sub}</div>
          </div>
          <div class="arrow">›</div>
        `;
        categoryGrid.appendChild(card);
      });
    }

    function createSessionId() {
      return "faeing_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    }

    function quietRecord() {
      state.updatedAt = new Date().toISOString();

      const records = JSON.parse(localStorage.getItem("faeing_records") || "[]");
      const index = records.findIndex(r => r.sessionId === state.sessionId);

      if (index >= 0) {
        records[index] = { ...state };
      } else {
        records.push({ ...state });
      }

      localStorage.setItem("faeing_records", JSON.stringify(records));

      /*
        나중에 Firebase로 바꿀 때는 여기 안에만 추가하면 됩니다.

        예:
        await addDoc(collection(db, "diagnosisRecords"), state);
      */
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startDiagnosis(key) {
      state = {
        sessionId: createSessionId(),
        categoryKey: key,
        resultKey: null,
        questionIndex: 0,
        checkIndex: 0,
        answers: [],
        checks: [],
        openedPanels: [],
        startedAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      historyStack = [{ type: "home" }];
      quietRecord();
      renderQuestion(0);
    }

    function renderQuestion(index) {
      const category = diagnosisData[state.categoryKey];
      const q = category.questions[index];

      state.questionIndex = index;
      quietRecord();

      document.getElementById("questionLabel").textContent = `${category.title} 확인`;
      document.getElementById("questionTitle").textContent = q.q;
      document.getElementById("questionDesc").textContent = q.d;

      const box = document.getElementById("questionOptions");
      box.innerHTML = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = option.text;

        btn.onclick = () => {
          state.answers.push({
            question: q.q,
            answer: option.text,
            time: new Date().toISOString()
          });

          historyStack.push({ type: "question", index });

          quietRecord();

          if (option.next !== undefined) {
            renderQuestion(option.next);
          } else {
            startChecks(option.result);
          }
        };

        box.appendChild(btn);
      });

      showScreen("questionScreen");
    }

    function startChecks(resultKey) {
      state.resultKey = resultKey;
      state.checkIndex = 0;
      state.checks = [];
      historyStack.push({ type: "resultStart", resultKey });
      quietRecord();
      renderCheck();
    }

    function renderCheck() {
      const category = diagnosisData[state.categoryKey];
      const result = category.results[state.resultKey];
      const checks = result.checks;
      const current = checks[state.checkIndex];

      if (!current) {
        renderFinal();
        return;
      }

      const percent = ((state.checkIndex) / checks.length) * 100;

      document.getElementById("checkProgress").style.width = `${percent}%`;
      document.getElementById("checkLabel").textContent =
        `${state.checkIndex + 1} / ${checks.length}`;

      document.getElementById("checkTitle").textContent = current;
      document.getElementById("checkDesc").textContent =
        "확인한 상태에 가장 가까운 것을 선택하세요.";

      quietRecord();
      showScreen("checkScreen");
    }

    function answerCheck(answer) {
      const category = diagnosisData[state.categoryKey];
      const result = category.results[state.resultKey];
      const item = result.checks[state.checkIndex];

      state.checks.push({
        item,
        answer,
        time: new Date().toISOString()
      });

      historyStack.push({ type: "check", index: state.checkIndex });

      state.checkIndex++;
      quietRecord();

      renderCheck();
    }

    function renderFinal() {
      const category = diagnosisData[state.categoryKey];
      const result = category.results[state.resultKey];

      document.getElementById("checkProgress").style.width = "100%";

      document.getElementById("finalTitle").textContent = result.title;
      document.getElementById("finalDesc").textContent = result.desc;

      const abnormal = state.checks.filter(c => c.answer === "이상");
      const unknown = state.checks.filter(c => c.answer === "모름");

      let html = "";

      if (abnormal.length === 0 && unknown.length === 0) {
        html = "확인 항목에서 뚜렷한 이상은 선택되지 않았습니다. 증상이 계속되면 다음 흐름을 더 확인해야 합니다.";
      } else {
        html += `<strong>우선 살펴볼 항목</strong><br>`;
        abnormal.forEach(c => {
          html += `• ${c.item}<br>`;
        });

        if (unknown.length > 0) {
          html += `<br><strong>확인이 어려웠던 항목</strong><br>`;
          unknown.forEach(c => {
            html += `• ${c.item}<br>`;
          });
        }
      }

      document.getElementById("finalSummary").innerHTML = html;

      document.getElementById("principlePanel").innerHTML =
        `<strong>구조원리</strong><br>${category.principle}`;

      document.getElementById("maintenancePanel").innerHTML =
        `<strong>관리확인</strong><br>${category.maintenance}`;

      document.getElementById("supportPanel").innerHTML =
        `<strong>도움요청</strong><br>
        지금 확인한 흐름을 기준으로 기종, 기대번호, 사진, 연락처를 함께 남기면 다음 판단이 쉬워집니다.<br><br>
        다음 단계에서는 이 영역을 실제 입력폼으로 연결하면 됩니다.`;

      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

      quietRecord();
      showScreen("finalScreen");
    }

    function togglePanel(id) {
      const panel = document.getElementById(id);
      panel.classList.toggle("active");

      if (!state.openedPanels.includes(id)) {
        state.openedPanels.push(id);
      }

      quietRecord();
    }

    function goBack() {
      const last = historyStack.pop();

      if (!last || last.type === "home") {
        goHome();
        return;
      }

      if (last.type === "question") {
        state.answers.pop();
        renderQuestion(last.index);
        return;
      }

      if (last.type === "check") {
        state.checks.pop();
        state.checkIndex = last.index;
        renderCheck();
        return;
      }

      if (last.type === "resultStart") {
        state.resultKey = null;
        state.checkIndex = 0;
        state.checks = [];
        renderQuestion(state.questionIndex);
      }

      quietRecord();
    }

    function goHome() {
      state = {
        sessionId: null,
        categoryKey: null,
        resultKey: null,
        questionIndex: 0,
        checkIndex: 0,
        answers: [],
        checks: [],
        openedPanels: [],
        startedAt: null,
        updatedAt: null
      };

      historyStack = [];
      showScreen("homeScreen");
    }

    init();
  </script>
</body>
</html>
