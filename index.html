<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faeing</title>
  <meta name="description" content="농기계 문제를 흐름으로 파악하는 현장 기반 진단 시스템">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:"Noto Sans KR", "Times New Roman", sans-serif;
      background:#f9faf7;
      color:#222;
      min-height:100vh;
    }

    .navbar {
      height:56px;
      background:#F2F1EE;
      border-bottom:1px solid rgba(0,0,0,0.05);
      display:flex;
      align-items:center;
      padding:0 22px;
    }

    .nav-home {
      display:flex;
      align-items:center;
      gap:14px;
      cursor:pointer;
    }

    .nav-logo { height:34px; }
    .nav-brand { font-size:22px; letter-spacing:0.08em; }

    .main {
      min-height:calc(100vh - 56px);
      display:flex;
      justify-content:center;
      padding:38px 16px;
    }

    .screen {
      width:100%;
      max-width:820px;
      display:none;
    }

    .screen.active { display:block; }

    .eyebrow {
      text-align:center;
      font-size:13px;
      letter-spacing:0.12em;
      color:rgba(0,0,0,0.45);
      margin-bottom:16px;
    }

    .title {
      text-align:center;
      font-size:clamp(28px,4vw,42px);
      font-weight:500;
      line-height:1.35;
      margin-bottom:14px;
      letter-spacing:-0.03em;
    }

    .desc {
      text-align:center;
      font-size:16px;
      line-height:1.7;
      color:rgba(0,0,0,0.58);
      margin-bottom:34px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .card {
      background:#F2F1EE;
      border-radius:22px;
      padding:22px 24px;
      border:1px solid rgba(0,0,0,0.05);
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:86px;
      cursor:pointer;
      transition:0.2s ease;
    }

    .card:hover {
      background:#E9E7E1;
      transform:translateY(-2px);
    }

    .card-title { font-size:21px; font-weight:500; }
    .card-sub {
      font-size:13px;
      color:rgba(0,0,0,0.48);
      margin-top:6px;
      line-height:1.5;
    }

    .arrow {
      font-size:24px;
      color:rgba(0,0,0,0.35);
    }

    .box {
      background:#fff;
      border-radius:26px;
      padding:30px;
      border:1px solid rgba(0,0,0,0.06);
      box-shadow:0 12px 30px rgba(0,0,0,0.04);
    }

    .step-label {
      font-size:13px;
      letter-spacing:0.1em;
      color:rgba(0,0,0,0.42);
      margin-bottom:12px;
    }

    .step-title {
      font-size:30px;
      line-height:1.35;
      font-weight:500;
      margin-bottom:12px;
    }

    .step-desc {
      font-size:15px;
      line-height:1.7;
      color:rgba(0,0,0,0.6);
      margin-bottom:24px;
    }

    .option-list {
      display:grid;
      gap:12px;
    }

    .choice-btn {
      width:100%;
      border:none;
      background:#F2F1EE;
      padding:18px 20px;
      border-radius:18px;
      text-align:left;
      font-size:17px;
      cursor:pointer;
    }

    .choice-btn:hover { background:#E9E7E1; }

    .progress {
      height:6px;
      background:rgba(0,0,0,0.06);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:24px;
    }

    .progress-bar {
      height:100%;
      width:0%;
      background:#222;
      transition:0.25s ease;
    }

    .summary {
      background:#F9FAF7;
      border-radius:18px;
      padding:18px;
      line-height:1.8;
      font-size:15px;
      margin-top:20px;
    }

    .tools {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:24px;
    }

    .tool-btn {
      border:none;
      background:#F2F1EE;
      border-radius:16px;
      padding:16px;
      cursor:pointer;
      font-size:14px;
    }

    .panel {
      display:none;
      margin-top:14px;
      padding:18px;
      border-radius:18px;
      background:#F9FAF7;
      border:1px solid rgba(0,0,0,0.06);
      line-height:1.8;
      font-size:15px;
    }

    .panel.active { display:block; }

    .restart-btn {
      width:100%;
      margin-top:24px;
      border:none;
      background:#222;
      color:#fff;
      padding:18px;
      border-radius:18px;
      font-size:16px;
      cursor:pointer;
    }

    .back-btn {
      border:none;
      background:transparent;
      margin-bottom:20px;
      cursor:pointer;
      font-size:14px;
      color:rgba(0,0,0,0.55);
    }

    @media(max-width:768px) {
      .grid { grid-template-columns:1fr; }
      .box { padding:24px 18px; }
      .tools { grid-template-columns:1fr; }
      .step-title { font-size:24px; }
      .navbar { padding:0 18px; }
      .nav-logo { height:30px; }
      .nav-brand { font-size:18px; }
    }
  </style>
</head>

<body>
  <header class="navbar">
    <div class="nav-home" onclick="goHome()">
      <img src="assets/images/logo.png" class="nav-logo" alt="Faeing">
      <div class="nav-brand">Faeing</div>
    </div>

  <main class="main">

    <section id="homeScreen" class="screen active">
      <div class="eyebrow">AGRICULTURAL MACHINE DIAGNOSIS</div>

        문제 방향을 정리합니다.
      </p>
      <div class="grid" id="categoryGrid"></div>
    </section>

    <section id="questionScreen" class="screen">
      <button class="back-btn" onclick="goBack()">← 이전으로</button>
      <div class="box">
        <div class="step-label" id="questionLabel"></div>
        <h2 class="step-title" id="questionTitle"></h2>
        <p class="step-desc" id="questionDesc"></p>
        <div class="option-list" id="questionOptions"></div>
      </div>
    </section>

    <section id="checkScreen" class="screen">
      <button class="back-btn" onclick="goBack()">← 이전으로</button>
      <div class="box">
        <div class="progress">

        </div>
        <div class="step-label" id="checkLabel"></div>

        <p class="step-desc">확인한 상태에 가장 가까운 것을 선택하세요.</p>
        <div class="option-list">
          <button class="choice-btn" onclick="answerCheck('정상')">정상입니다</button>
          <button class="choice-btn" onclick="answerCheck('이상')">이상이 있습니다</button>
          <button class="choice-btn" onclick="answerCheck('모름')">확인하기 어렵습니다</button>
        </div>
      </div>
    </section>

    <section id="finalScreen" class="screen">
      <button class="back-btn" onclick="goBack()">← 이전으로</button>
      <div class="box">
        <div class="step-label">정리된 방향</div>
        <h2 class="step-title" id="finalTitle"></h2>
        <p class="step-desc" id="finalDesc"></p>
        <div class="summary" id="summary"></div>

        <div class="tools">
          <button class="tool-btn" onclick="togglePanel('principlePanel')">구조원리</button>
          <button class="tool-btn" onclick="togglePanel('maintenancePanel')">관리확인</button>
          <button class="tool-btn" onclick="togglePanel('supportPanel')">도움요청</button>
        </div>

        <div id="principlePanel" class="panel"></div>
        <div id="maintenancePanel" class="panel"></div>
        <div id="supportPanel" class="panel"></div>

        <button class="restart-btn" onclick="goHome()">처음으로 돌아가기</button>
      </div>
    </section>

  </main>

    let state = {
      sessionId:null,
      categoryKey:null,
      questionIndex:0,
      resultKey:null,
      checkIndex:0,
      answers:[],
      checks:[],
      openedPanels:[],
      startedAt:null,
      updatedAt:null
    };

    let historyStack = [];
    const categoryGrid = document.getElementById("categoryGrid");

    function init() {
      categoryGrid.innerHTML = "";

      Object.keys(diagnosisData).forEach(key => {
        const data = diagnosisData[key];
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => startDiagnosis(key);
        card.innerHTML = `
          <div>
            <div class="card-title">${data.title}</div>
            <div class="card-sub">${data.sub}</div>
          </div>
          <div class="arrow">›</div>
        `;
        categoryGrid.appendChild(card);
      });
    }

    function createSessionId() {
      return "faeing_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
    }

    function quietRecord() {
      if (!state.sessionId) return;

      state.updatedAt = new Date().toISOString();

      const records = JSON.parse(localStorage.getItem("faeing_records") || "[]");
      const index = records.findIndex(r => r.sessionId === state.sessionId);

      if (index >= 0) records[index] = { ...state };
      else records.push({ ...state });

      localStorage.setItem("faeing_records", JSON.stringify(records));
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top:0, behavior:"smooth" });
    }

    function startDiagnosis(key) {
      state = {
        sessionId:createSessionId(),
        categoryKey:key,
        questionIndex:0,
        resultKey:null,
        checkIndex:0,
        answers:[],
        checks:[],
        openedPanels:[],
        startedAt:new Date().toISOString(),
        updatedAt:new Date().toISOString()
      };

      historyStack = [{ type:"home" }];
      quietRecord();
      renderQuestion(0);
    }

    function renderQuestion(index) {
      const category = diagnosisData[state.categoryKey];
      const q = category.questions[index];

      state.questionIndex = index;
      quietRecord();

      document.getElementById("questionLabel").textContent = `${category.title} 확인`;
      document.getElementById("questionTitle").textContent = q.q;
      document.getElementById("questionDesc").textContent = q.d;

      const box = document.getElementById("questionOptions");
      box.innerHTML = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = option.text;

        btn.onclick = () => {
          state.answers.push({
            question:q.q,
            answer:option.text,
            time:new Date().toISOString()
          });

          historyStack.push({ type:"question", index });
          quietRecord();

          if (option.next !== undefined) renderQuestion(option.next);
          else startChecks(option.result);
        };

        box.appendChild(btn);
      });

      showScreen("questionScreen");
    }

    function startChecks(resultKey) {
      state.resultKey = resultKey;
      state.checkIndex = 0;
      state.checks = [];
      historyStack.push({ type:"resultStart", resultKey });
      quietRecord();
      renderCheck();
    }

    function renderCheck() {
      const category = diagnosisData[state.categoryKey];
      const result = category.results[state.resultKey];
      const checks = result.checks;
      const current = checks[state.checkIndex];

      if (!current) {
        renderFinal();
        return;
      }

      document.getElementById("progressBar").style.width =
        `${(state.checkIndex / checks.length) * 100}%`;

      document.getElementById("checkLabel").textContent =
        `${state.checkIndex + 1} / ${checks.length}`;

      document.getElementById("checkTitle").textContent = current;

      quietRecord();
      showScreen("checkScreen");
    }

    function answerCheck(answer) {
      const category = diagnosisData[state.categoryKey];
      const result = category.results[state.resultKey];
      const item = result.checks[state.checkIndex];

      state.checks.push({
        item,
        answer,
        time:new Date().toISOString()
      });

      historyStack.push({ type:"check", index:state.checkIndex });
      state.checkIndex++;
      quietRecord();
      renderCheck();
    }

    function renderFinal() {
      const category = diagnosisData[state.categoryKey];
      const result = category.results[state.resultKey];

      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("finalTitle").textContent = result.title;
      document.getElementById("finalDesc").textContent = result.desc;

      const abnormal = state.checks.filter(c => c.answer === "이상");
      const unknown = state.checks.filter(c => c.answer === "모름");

      let html = "";

      if (result.causes && result.causes.length > 0) {
        html += `<strong>가능성이 높은 원인</strong><br>`;
        result.causes.forEach(cause => {
          html += `• ${cause}<br>`;
        });
        html += `<br>`;
      }

      if (abnormal.length > 0) {
        html += `<strong>이상이 체크된 항목</strong><br>`;
        abnormal.forEach(item => {
          html += `• ${item.item}<br>`;
        });
      } else {
        html += `뚜렷한 이상 항목은 선택되지 않았습니다.`;
      }

      if (unknown.length > 0) {
        html += `<br><br><strong>확인이 어려웠던 항목</strong><br>`;
        unknown.forEach(item => {
          html += `• ${item.item}<br>`;
        });
      }

      document.getElementById("summary").innerHTML = html;

      document.getElementById("principlePanel").innerHTML =
        `<strong>구조원리</strong><br>${category.principle}`;

      document.getElementById("maintenancePanel").innerHTML =
        `<strong>관리확인</strong><br>${category.maintenance}`;

      document.getElementById("supportPanel").innerHTML =
        `<strong>도움요청</strong><br>
        현재 확인한 흐름을 기준으로 기종, 기대번호, 사진, 연락처를 함께 전달하면 다음 판단이 쉬워집니다.`;

      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

      quietRecord();
      showScreen("finalScreen");
    }

    function togglePanel(id) {
      const panel = document.getElementById(id);
      panel.classList.toggle("active");

      if (!state.openedPanels.includes(id)) {
        state.openedPanels.push(id);
      }

      quietRecord();
    }

    function goBack() {
      const last = historyStack.pop();

      if (!last || last.type === "home") {
        goHome();
        return;
      }

      if (last.type === "question") {
        state.answers.pop();
        renderQuestion(last.index);
        return;
      }

      if (last.type === "check") {
        state.checks.pop();
        state.checkIndex = last.index;
        renderCheck();
        return;
      }

      if (last.type === "resultStart") {
        state.resultKey = null;
        state.checkIndex = 0;
        state.checks = [];
        renderQuestion(state.questionIndex);
      }

      quietRecord();
    }

    function goHome() {
      state = {
        sessionId:null,
        categoryKey:null,
        questionIndex:0,
        resultKey:null,
        checkIndex:0,
        answers:[],
        checks:[],
        openedPanels:[],
        startedAt:null,
        updatedAt:null
      };

      historyStack = [];
      showScreen("homeScreen");
    }

    init();
  </script>
</body>
</html>
