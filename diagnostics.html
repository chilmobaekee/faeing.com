<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faeing | 고장진단</title>

  <meta name="description" content="Faeing 고장진단 페이지 - 클릭형 조건 선택과 노드식 질문으로 농기계 고장 흐름을 확인합니다.">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Times New Roman", "Malgun Gothic", serif;
      background: #f9faf7;
      color: #222;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .navbar {
      width: 100%;
      min-height: 56px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #F2F1EE;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .nav-home {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .nav-logo {
      height: 36px;
      width: auto;
      display: block;
    }

    .nav-brand {
      font-size: 22px;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .system-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      margin-left: 18px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .system-nav::-webkit-scrollbar {
      display: none;
    }

    .system-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: #111;
      padding: 4px 0;
      position: relative;
      flex-shrink: 0;
    }

    .system-nav .separator {
      opacity: 0.35;
      flex-shrink: 0;
    }

    .system-nav button.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -8px;
      height: 1.5px;
      background: #111;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-search {
      padding: 8px 14px;
      border: none;
      border-radius: 999px;
      background: rgba(0,0,0,0.04);
      font-size: 13px;
      color: #333;
      outline: none;
      width: 210px;
    }

    .nav-btn {
      border: none;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
    }

    .login-btn {
      color: rgba(0,0,0,0.6);
    }

    .signup-btn {
      color: rgba(0,0,0,0.65);
      background: rgba(0,0,0,0.02);
    }

    .diagnosis-page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 26px 22px 42px;
    }

    .diagnosis-heading {
      margin-bottom: 20px;
    }

    .diagnosis-title {
      font-size: 34px;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .diagnosis-subtitle {
      font-size: 15px;
      color: rgba(0,0,0,0.62);
      line-height: 1.7;
    }

    .diagnosis-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
      align-items: start;
    }

    .case-menu {
      background: #ECEFEC;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 16px;
      padding: 10px;
      position: sticky;
      top: 78px;
    }

    .case-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      padding: 14px 14px;
      border-radius: 12px;
      font-size: 16px;
      color: rgba(0,0,0,0.68);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .case-item:hover,
    .case-item.active {
      background: #ffffff;
      color: #111;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      font-weight: 600;
    }

    .paper-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .paper {
      width: min(980px, 100%);
      min-height: 1100px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 14px 34px rgba(0,0,0,0.06);
      padding: 52px 56px 62px;
      position: relative;
    }

    .paper::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: linear-gradient(to right, #e5e5e0, #f5f5f2, #e5e5e0);
    }

    .paper-head {
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding-bottom: 18px;
      margin-bottom: 26px;
    }

    .paper-system {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.42);
      margin-bottom: 8px;
    }

    .paper-title {
      font-size: 34px;
      line-height: 1.34;
      letter-spacing: -0.02em;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .paper-sub {
      font-size: 15px;
      color: rgba(0,0,0,0.56);
      line-height: 1.8;
    }

    .node-panel {
      background: #F6F6F2;
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 24px;
    }

    .node-title {
      font-size: 21px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .node-help {
      font-size: 15px;
      color: rgba(0,0,0,0.62);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .history-chip {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      color: rgba(0,0,0,0.65);
    }

    .question-box {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .question {
      font-size: 19px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .answer-btn {
      border: 1px solid rgba(0,0,0,0.08);
      background: #FAFAF7;
      border-radius: 12px;
      padding: 13px 14px;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.5;
    }

    .answer-btn:hover {
      background: #EFEFE8;
    }

    .result-box {
      margin-top: 18px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 18px;
    }

    .result-title {
      font-size: 20px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .check-list {
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .check-list li {
      padding-left: 22px;
      position: relative;
      line-height: 1.7;
      color: rgba(0,0,0,0.78);
    }

    .check-list li::before {
      content: "□";
      position: absolute;
      left: 0;
      top: 0;
      color: rgba(0,0,0,0.45);
    }

    .reset-btn {
      margin-top: 16px;
      border: none;
      background: #222;
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    .paper-quote {
      margin-top: 28px;
      padding: 18px 20px;
      background: #F6F6F2;
      border-left: 2px solid #CBBDA5;
      font-size: 16px;
      line-height: 1.9;
      color: rgba(0,0,0,0.72);
    }

    details {
      margin-top: 28px;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 18px;
    }

    summary {
      cursor: pointer;
      font-size: 17px;
      color: rgba(0,0,0,0.72);
      margin-bottom: 14px;
    }

    .paper-body {
      font-size: 17px;
      line-height: 2;
      color: rgba(0,0,0,0.82);
      white-space: pre-line;
    }

    .paper-note {
      margin-top: 24px;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(0,0,0,0.58);
    }

    @media (max-width: 1200px) {
      .navbar {
        flex-wrap: wrap;
        height: auto;
        padding: 12px 18px;
      }

      .nav-left {
        width: 100%;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 1100px) {
      .diagnosis-layout {
        grid-template-columns: 1fr;
      }

      .case-menu {
        position: static;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .case-item {
        margin-bottom: 0;
        text-align: center;
      }

      .paper {
        min-height: auto;
        padding: 36px 24px 42px;
      }

      .paper-title {
        font-size: 28px;
      }
    }

    @media (max-width: 768px) {
      .nav-search {
        width: 130px;
      }

      .nav-btn {
        padding: 7px 12px;
      }

      .diagnosis-page {
        padding: 18px 14px 28px;
      }

      .diagnosis-title {
        font-size: 28px;
      }

      .case-menu,
      .answer-grid {
        grid-template-columns: 1fr;
      }

      .system-nav {
        gap: 10px;
        margin-left: 0;
        width: 100%;
        padding-top: 4px;
      }
    }
  </style>
</head>

<body>
  <div class="navbar">
    <div class="nav-left">
      <a href="/" class="nav-home">
        <img src="assets/images/logo.png" alt="Faeing" class="nav-logo">
        <span class="nav-brand">Faeing</span>
      </a>

      <div class="system-nav" id="systemTabs"></div>
    </div>

    <div class="nav-right">
      <input type="text" class="nav-search" placeholder="검색하거나 이동하세요…">
      <button class="nav-btn login-btn">Login</button>
      <button class="nav-btn signup-btn">Sign Up</button>
    </div>
  </div>

  <main class="diagnosis-page">
    <section class="diagnosis-heading">
      <h1 class="diagnosis-title">고장진단</h1>
      <p class="diagnosis-subtitle">
        증상을 먼저 고르고, 질문을 따라가며 체크할 순서를 좁혀갑니다.
        문서형 설명은 아래에 남겨 두어 배우고 싶은 사람도 흐름을 읽을 수 있게 합니다.
      </p>
    </section>

    <section class="diagnosis-layout">
      <aside class="case-menu" id="caseMenu"></aside>

      <section class="paper-wrap">
        <article class="paper">
          <div class="paper-head">
            <div class="paper-system" id="paperSystem">DIAGNOSIS NODE</div>
            <h2 class="paper-title" id="paperTitle">시동 불량</h2>
            <div class="paper-sub" id="paperSub">시동 조건부터 전기, 연료, 흡배기 흐름까지 차례대로 확인합니다.</div>
          </div>

          <section class="node-panel">
            <h3 class="node-title">클릭형 진단 흐름</h3>
            <p class="node-help">아래 질문에 답하면 선택한 조건이 위에 쌓이고, 다음 확인 순서가 열립니다.</p>

            <div class="history" id="history"></div>

            <div class="question-box" id="questionBox">
              <div class="question" id="questionText"></div>
              <div class="answer-grid" id="answerGrid"></div>
            </div>

            <div class="result-box" id="resultBox" style="display:none;">
              <div class="result-title" id="resultTitle"></div>
              <ul class="check-list" id="checkList"></ul>
              <button class="reset-btn" onclick="resetNode()">처음부터 다시 보기</button>
            </div>
          </section>

          <div class="paper-quote" id="paperQuote"></div>

          <details>
            <summary>문서형 설명 열기</summary>
            <div class="paper-body" id="paperBody"></div>
            <div class="paper-note" id="paperNote"></div>
          </details>
        </article>
      </section>
    </section>
  </main>

  <script>
    const diagnosisData = {
      start: {
        label: "시동 불량",
        eng: "STARTING FAILURE",
        subtitle: "시동 조건부터 전기, 연료, 흡배기 흐름까지 차례대로 확인합니다.",
        quote: "시동 불량은 먼저 조건을 보고, 그다음 전기와 연료의 흐름을 봅니다.",
        body:
`시동 불량은 가장 먼저 시동 조건을 확인해야 합니다.

전후진 레버가 중립인지,
PTO가 꺼져 있는지,
클러치 안전스위치가 정상인지,
계기판 전원이 정상적으로 들어오는지를 먼저 봅니다.

그다음 크랭킹이 되는지,
크랭킹 소리가 약한지,
크랭킹은 되는데 시동이 안 걸리는지로 나눕니다.

시동은 단순히 스타터 하나의 문제가 아니라
전기, 연료, 공기, 압축, ECU 조건이 함께 맞아야 이루어집니다.`,
        note: "현장에서는 부품 교환보다 조건 확인이 먼저입니다.",
        nodes: {
          q1: {
            question: "계기판 전원이 정상적으로 들어옵니까?",
            answers: [
              { text: "전원이 안 들어온다", next: "r_power" },
              { text: "전원은 들어온다", next: "q2" }
            ]
          },
          q2: {
            question: "스타터가 크랭킹을 합니까?",
            answers: [
              { text: "아예 돌지 않는다", next: "r_no_crank" },
              { text: "돌긴 도는데 약하다", next: "r_weak_crank" },
              { text: "정상적으로 돈다", next: "q3" }
            ]
          },
          q3: {
            question: "크랭킹은 되는데 연료가 올라오는 느낌이 있습니까?",
            answers: [
              { text: "연료가 안 오는 것 같다", next: "r_fuel" },
              { text: "연료는 오는 것 같다", next: "r_air_ecu" }
            ]
          }
        },
        results: {
          r_power: ["배터리 전압 확인", "배터리 단자 부식 확인", "메인퓨즈 확인", "접지선 체결 상태 확인", "키 스위치 입력 전원 확인"],
          r_no_crank: ["전후진 중립 확인", "PTO OFF 확인", "클러치 안전스위치 확인", "스타터 릴레이 확인", "스타터 S단자 전압 확인"],
          r_weak_crank: ["배터리 부하전압 확인", "접지 불량 확인", "스타터 내부 마모 확인", "엔진 오일 과점도 여부 확인", "케이블 열화 확인"],
          r_fuel: ["연료탱크 잔량 확인", "연료필터 막힘 확인", "에어 혼입 확인", "저압펌프 작동 확인", "수분필터 및 연료라인 확인"],
          r_air_ecu: ["흡기 막힘 확인", "EGR 배선 확인", "ECU 전원 확인", "IMV 또는 연료압 제어 확인", "고장코드 확인"]
        }
      },

      powerloss: {
        label: "출력 저하",
        eng: "POWER LOSS",
        subtitle: "연료, 흡기, 냉각, 배기 후처리장치까지 함께 봅니다.",
        quote: "출력 저하는 힘이 부족한 것이 아니라 흐름이 막힌 결과일 수 있습니다.",
        body:
`출력 저하는 엔진만의 문제가 아닐 수 있습니다.

연료 공급이 부족해도 출력이 떨어지고,
흡기 필터가 막혀도 출력이 떨어지며,
냉각이 불안정해도 출력 제한이 걸릴 수 있습니다.

요즘 장비는 환경규제로 인해 DPF, DOC, SCR, 요소수 시스템 같은 배기 후처리장치가 추가되었습니다.

이 장치에 막힘, 재생 불량, 센서 이상, 요소수 품질 문제가 생기면
엔진 자체가 멀쩡해도 출력 제한이 걸릴 수 있습니다.`,
        note: "최근 장비의 출력 저하는 배기 후처리장치를 반드시 함께 봐야 합니다.",
        nodes: {
          q1: {
            question: "출력 저하와 함께 경고등 또는 고장코드가 있습니까?",
            answers: [
              { text: "경고등이 있다", next: "q2" },
              { text: "경고등은 없다", next: "q3" }
            ]
          },
          q2: {
            question: "DPF, SCR, 요소수, 배기 관련 경고입니까?",
            answers: [
              { text: "배기 후처리 관련이다", next: "r_after" },
              { text: "다른 경고다", next: "r_code" }
            ]
          },
          q3: {
            question: "부하를 걸 때 검은 연기나 답답함이 있습니까?",
            answers: [
              { text: "검은 연기 또는 답답함이 있다", next: "r_air_fuel" },
              { text: "연기는 없지만 힘만 없다", next: "r_basic" }
            ]
          }
        },
        results: {
          r_after: ["DPF 재생 이력 확인", "배기 차압센서 확인", "DPF 막힘 확인", "요소수 잔량과 품질 확인", "SCR/NOx 센서 관련 코드 확인"],
          r_code: ["진단기 고장코드 확인", "센서 전원 및 접지 확인", "ECU 출력 제한 조건 확인", "엔진 보호모드 진입 여부 확인"],
          r_air_fuel: ["에어클리너 막힘 확인", "터보 흡기호스 빠짐 확인", "연료필터 막힘 확인", "인젝터 상태 확인", "EGR stuck 여부 확인"],
          r_basic: ["작업 부하 과다 확인", "냉각수 온도 상승 확인", "미션 또는 PTO 슬립 확인", "연료라인 에어 혼입 확인", "엔진오일 상태 확인"]
        }
      },

      hydraulic: {
        label: "유압 이상",
        eng: "HYDRAULIC TROUBLE",
        subtitle: "오일, 펌프, 밸브, 내부 누설 순서로 봅니다.",
        quote: "유압은 새는 것만 보는 것이 아니라 압력이 살아 있는지를 봐야 합니다.",
        body:
`유압 문제는 움직임이 느리거나 힘이 없거나 한쪽 기능만 작동하지 않는 형태로 나타납니다.

          r_leak: ["호스 파열 확인", "피팅 체결 확인", "실린더 로드씰 확인", "밸브블록 누유 확인"],

        quote: "전기는 보이지 않지만, 흐름은 반드시 흔적을 남깁니다.",
        body:

        results: {

            answers: [
              { text: "막혀 있다", next: "r_radiator" },
              { text: "깨끗하다", next: "r_internal" }
            ]
          }
        },
        results: {
          r_coolant: ["냉각수 보충", "호스 누수 확인", "라디에이터 캡 확인", "워터펌프 누수 확인", "헤드가스켓 의심 증상 확인"],

          r_internal: ["써모스탯 작동 확인", "워터펌프 순환 확인", "엔진오일 상태 확인", "작업 부하 과다 여부 확인", "냉각계 내부 막힘 확인"]

      }
    };

    const caseKeys = Object.keys(diagnosisData);
    let currentCase = "start";
    let currentNode = "q1";
    let historyStack = [];

    const systemTabsEl = document.getElementById("systemTabs");
    const caseMenuEl = document.getElementById("caseMenu");
    const paperSystemEl = document.getElementById("paperSystem");
    const paperTitleEl = document.getElementById("paperTitle");
    const paperSubEl = document.getElementById("paperSub");
    const paperQuoteEl = document.getElementById("paperQuote");
    const paperBodyEl = document.getElementById("paperBody");
    const paperNoteEl = document.getElementById("paperNote");
    const historyEl = document.getElementById("history");
    const questionTextEl = document.getElementById("questionText");
    const answerGridEl = document.getElementById("answerGrid");
    const questionBoxEl = document.getElementById("questionBox");
    const resultBoxEl = document.getElementById("resultBox");
    const resultTitleEl = document.getElementById("resultTitle");
    const checkListEl = document.getElementById("checkList");

    function renderSystemTabs() {
      systemTabsEl.innerHTML = "";

      caseKeys.forEach((key, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = currentCase === key ? "active" : "";
        btn.textContent = diagnosisData[key].label;
        btn.onclick = () => {
          currentCase = key;
          resetNode(false);
          renderAll();
        };
        systemTabsEl.appendChild(btn);

        if (index < caseKeys.length - 1) {
          const sep = document.createElement("span");
          sep.className = "separator";
          sep.textContent = "/";
          systemTabsEl.appendChild(sep);
        }
      });
    }

    function renderCaseMenu() {
      caseMenuEl.innerHTML = "";

      caseKeys.forEach((key) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "case-item" + (key === currentCase ? " active" : "");
        btn.textContent = diagnosisData[key].label;
        btn.onclick = () => {
          currentCase = key;
          resetNode(false);
          renderAll();
        };
        caseMenuEl.appendChild(btn);
      });
    }

    function renderPaper() {
      const data = diagnosisData[currentCase];

      paperSystemEl.textContent = data.eng;
      paperTitleEl.textContent = data.label;
      paperSubEl.textContent = data.subtitle;
      paperQuoteEl.textContent = data.quote;
      paperBodyEl.textContent = data.body;
      paperNoteEl.textContent = data.note;
    }

    function renderNode() {
      const data = diagnosisData[currentCase];
      const node = data.nodes[currentNode];

      renderHistory();

      resultBoxEl.style.display = "none";
      questionBoxEl.style.display = "block";
      questionTextEl.textContent = node.question;
      answerGridEl.innerHTML = "";

      node.answers.forEach((answer) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer-btn";
        btn.textContent = answer.text;
        btn.onclick = () => {
          historyStack.push(answer.text);

          if (answer.next.startsWith("r_")) {
            renderResult(answer.next);
          } else {
            currentNode = answer.next;
            renderNode();
          }
        };
        answerGridEl.appendChild(btn);
      });
    }

    function renderHistory() {
      historyEl.innerHTML = "";

      if (historyStack.length === 0) {
        const chip = document.createElement("span");
        chip.className = "history-chip";
        chip.textContent = "조건을 선택하면 여기에 쌓입니다";
        historyEl.appendChild(chip);
        return;
      }

      historyStack.forEach((item, index) => {
        const chip = document.createElement("span");
        chip.className = "history-chip";
        chip.textContent = `${index + 1}. ${item}`;
        historyEl.appendChild(chip);
      });
    }

    function renderResult(resultKey) {
      const data = diagnosisData[currentCase];
      const checks = data.results[resultKey];

      renderHistory();

      questionBoxEl.style.display = "none";
      resultBoxEl.style.display = "block";
      resultTitleEl.textContent = "우선 확인할 체크리스트";
      checkListEl.innerHTML = "";

      checks.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        checkListEl.appendChild(li);
      });
    }

    function resetNode(shouldRender = true) {
      currentNode = "q1";
      historyStack = [];

      if (shouldRender) {
        renderNode();
      }
    }

    function renderAll() {
      renderSystemTabs();
      renderCaseMenu();
      renderPaper();
      renderNode();
    }

    renderAll();
  </script>
</body>
</html>
