<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페잉 고장진단</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f2;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 18px 20px;
    }

    .brand {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 800;
    }

    .brand-subtitle {
      font-size: 13px;
      color: #666;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .hero, .diagnosis-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 26px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.3;
    }

    .hero p {
      margin: 0;
      color: #555;
    }

    .flow-box {
      background: #eef4ec;
      border: 1px solid #d8e4d4;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #365038;
    }

    .step-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .question {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      cursor: pointer;
      background: #2f5d3a;
      color: #ffffff;
      transition: 0.2s;
      text-align: left;
    }

    button:hover {
      background: #24492d;
      transform: translateY(-1px);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .category-button {
      min-height: 94px;
      background: #ffffff;
      color: #222;
      border: 1px solid #d8e4d4;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    .category-button strong {
      display: block;
      font-size: 17px;
      margin-bottom: 5px;
      color: #2f5d3a;
    }

    .category-button span {
      display: block;
      font-size: 13px;
      color: #666;
    }

    .category-button:hover {
      background: #eef4ec;
      color: #222;
    }

    .sub-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .sub-buttons button {
      background: #ffffff;
      color: #2f5d3a;
      border: 1px solid #b8c9b5;
      text-align: center;
    }

    .sub-buttons button:hover {
      background: #eef4ec;
    }

    .history {
      margin-bottom: 18px;
      padding: 14px;
      background: #f7f7f7;
      border-radius: 14px;
      font-size: 14px;
      color: #555;
    }

    .history strong {
      display: block;
      margin-bottom: 6px;
      color: #222;
    }

    .result-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #2f5d3a;
    }

    .section-title {
      margin-top: 20px;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 17px;
    }

    ul, ol {
      padding-left: 22px;
      margin-top: 8px;
    }

    li { margin-bottom: 6px; }

    .warning {
      margin-top: 22px;
      padding: 14px;
      border-radius: 14px;
      background: #fff7e6;
      border: 1px solid #f0d49a;
      font-size: 14px;
      color: #6b4b00;
    }

    footer {
      text-align: center;
      color: #777;
      font-size: 13px;
      padding: 30px 16px;
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 23px; }
      .brand { align-items: flex-start; flex-direction: column; }
      .diagnosis-card, .hero { padding: 20px; }
      .sub-buttons { flex-direction: column; }
      .category-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div>
        <div class="brand-title">Faeing.com</div>
        <div class="brand-subtitle">농기계와 소통하는 사람들</div>
      </div>
      <div class="brand-subtitle">고장진단 프로토타입</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>농기계 고장진단</h1>
      <p>고장은 부품 하나가 아니라 흐름이 끊긴 결과입니다. 먼저 증상을 고르고, 전원 · 동력 · 연료 · 유압 · 제어 흐름 순서로 확인합니다.</p>
    </section>

    <div class="flow-box">
      핵심 증상: 시동 안 걸림 / 힘이 약함 / 작업 중 꺼짐 / 이상 소리 / 유압 작동 불량
    </div>

    <section class="diagnosis-card" id="diagnosis"></section>

    <div class="sub-buttons">
      <button onclick="goBack()">이전 단계</button>
      <button onclick="restartDiagnosis()">처음으로</button>
    </div>
  </main>

  <footer>
    Faeing Diagnosis Prototype · 미완성이라도 흐름부터 만든다
  </footer>

  <script>

        causes: ["ECU 전원 또는 접지 불량", "IMV 또는 연료 압력 제어 문제", "크랭크각 센서 신호 불량", "EGR 관련 배선 문제", "CAN 통신 또는 제어 계통 오류"],

        checks: ["연료량과 연료 필터를 확인합니다.", "에어 빼기를 진행합니다.", "연료 차단 솔레노이드 작동 여부를 확인합니다.", "진단기로 엔진 회전수 신호가 잡히는지 확인합니다."]
      }
    };

    let currentStepId = "home";
    let history = [];

    function renderStep() {
      const box = document.getElementById("diagnosis");
      const step = steps[currentStepId];

      let historyHtml = "";
      if (history.length > 0) {
        historyHtml = `
          <div class="history">
            <strong>지금까지 선택한 내용</strong>
            ${history.map(item => `<div>• ${item.question} → ${item.answer}</div>`).join("")}
          </div>
        `;
      }

      if (step.type === "category") {
        box.innerHTML = `
          <div class="step-title">${step.title}</div>
          <div class="question">${step.question}</div>
          <div class="category-grid">
            ${step.categories.map(category => `
              <button class="category-button" onclick="selectCategory('${category.next}', '${escapeText(step.question)}', '${escapeText(category.title)}')">
                <strong>${category.title}</strong>
                <span>${category.desc}</span>
              </button>
            `).join("")}
          </div>
        `;
        return;
      }

      if (step.result) {
        box.innerHTML = `
          ${historyHtml}
          <div class="result-title">${step.title}</div>
          <p>${step.summary}</p>

          <div class="section-title">가능 원인</div>
          <ul>${step.causes.map(cause => `<li>${cause}</li>`).join("")}</ul>

          <div class="section-title">확인 순서</div>
          <ol>${step.checks.map(check => `<li>${check}</li>`).join("")}</ol>

          <div class="warning">
            주의: 이 진단은 방향을 잡기 위한 참고용입니다. 실제 수리는 안전을 확보하고 장비 매뉴얼과 현장 상태를 함께 확인해야 합니다.
          </div>
        `;
        return;
      }

      box.innerHTML = `
        ${historyHtml}
        <div class="step-title">${step.title}</div>
        <div class="question">${step.question}</div>
        <div class="answers">
          ${step.answers.map(answer => `
            <button onclick="selectAnswer('${answer.next}', '${escapeText(step.question)}', '${escapeText(answer.text)}')">
              ${answer.text}
            </button>
          `).join("")}
        </div>
      `;
    }

    function escapeText(text) {
      return text.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
    }

    function selectCategory(nextStepId, question, answer) {
      history.push({ question, answer });
      currentStepId = nextStepId;
      renderStep();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function selectAnswer(nextStepId, question, answer) {
      history.push({ question, answer });
      currentStepId = nextStepId;
      renderStep();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goBack() {
      if (history.length === 0) return;
      history.pop();

      currentStepId = "home";
      const savedHistory = [...history];
      history = [];

      for (const item of savedHistory) {
        const step = steps[currentStepId];

        if (step.type === "category") {
          const foundCategory = step.categories.find(c => c.title === item.answer);
          if (foundCategory) {
            history.push(item);
            currentStepId = foundCategory.next;
          }
          continue;
        }

        if (step.answers) {
          const foundAnswer = step.answers.find(a => a.text === item.answer);
          if (foundAnswer) {
            history.push(item);
            currentStepId = foundAnswer.next;
          }
        }
      }

      renderStep();
    }

    function restartDiagnosis() {
      currentStepId = "home";
      history = [];
      renderStep();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    renderStep();
  </script>
