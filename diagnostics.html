<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faeing | 고장진단</title>

  <meta name="description" content="Faeing 고장진단 페이지 - 시동, 출력, 정지, 이상 소리, 유압 문제를 차분하게 따라가는 문서형 진단 구조입니다.">

  <meta property="og:title" content="Faeing | 고장진단">
  <meta property="og:description" content="농기계 고장 증상을 차분하게 따라가는 문서형 진단 구조">
  <meta property="og:image" content="https://faeing.com/og-image.png">
  <meta property="og:url" content="https://faeing.com/diagnosis.html">
  <meta property="og:type" content="website">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Times New Roman", serif;
      background: #f9faf7;
      color: #222;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    /* =========================
       상단바
    ========================= */
    .navbar {
      width: 100%;
      min-height: 56px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #F2F1EE;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .nav-home {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .nav-logo {
      height: 36px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }

    .nav-brand {
      font-size: 22px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .system-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      margin-left: 18px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .system-nav::-webkit-scrollbar {
      display: none;
    }

    .system-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: #111;
      padding: 4px 0;
      position: relative;
      flex-shrink: 0;
    }

    .system-nav .separator {
      opacity: 0.35;
      flex-shrink: 0;
    }

    .system-nav button.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -8px;
      height: 1.5px;
      background: #111;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-search {
      padding: 8px 14px;
      border: none;
      border-radius: 999px;
      background: rgba(0,0,0,0.04);
      font-size: 13px;
      color: #333;
      outline: none;
      width: 210px;
    }

    .nav-search::placeholder {
      color: rgba(0,0,0,0.35);
    }

    .nav-btn {
      border: none;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      transition: background 0.2s ease;
    }

    .login-btn {
      color: rgba(0,0,0,0.6);
    }

    .login-btn:hover {
      background: rgba(0,0,0,0.04);
    }

    .signup-btn {
      color: rgba(0,0,0,0.65);
      background: rgba(0,0,0,0.02);
    }

    .signup-btn:hover {
      background: rgba(0,0,0,0.06);
    }

    /* =========================
       고장진단 본문
    ========================= */
    .machines-page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 26px 22px 42px;
    }

    .machines-heading {
      margin-bottom: 20px;
    }

    .machines-title {
      font-size: 34px;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .machines-subtitle {
      font-size: 15px;
      color: rgba(0,0,0,0.62);
      line-height: 1.7;
    }

    .machines-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* 왼쪽 진단 단계 메뉴 */
    .step-menu {
      background: #ECEFEC;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 16px;
      padding: 10px;
      position: sticky;
      top: 78px;
    }

    .step-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      padding: 14px 14px;
      border-radius: 12px;
      font-size: 16px;
      color: rgba(0,0,0,0.68);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      margin-bottom: 6px;
    }

    .step-item:last-child {
      margin-bottom: 0;
    }

    .step-item:hover {
      background: rgba(255,255,255,0.6);
      color: #111;
    }

    .step-item.active {
      background: #ffffff;
      color: #111;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      font-weight: 600;
    }

    /* 오른쪽 문서 */
    .paper-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .paper {
      width: min(960px, 100%);
      min-height: 1180px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 14px 34px rgba(0,0,0,0.06);
      padding: 56px 60px 64px;
      position: relative;
    }

    .paper::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: linear-gradient(to right, #e5e5e0, #f5f5f2, #e5e5e0);
    }

    .paper-head {
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding-bottom: 18px;
      margin-bottom: 28px;
    }

    .paper-system {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.42);
      margin-bottom: 8px;
    }

    .paper-title {
      font-size: 34px;
      line-height: 1.34;
      letter-spacing: -0.02em;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .paper-sub {
      font-size: 15px;
      color: rgba(0,0,0,0.56);
      line-height: 1.8;
    }

    .paper-image {
      width: 100%;
      min-height: 230px;
      margin: 28px 0 30px;
      border: 1px solid rgba(0,0,0,0.08);
      background: linear-gradient(135deg, #f3f4f1, #e8ece8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,0,0,0.50);
      font-size: 18px;
      line-height: 1.8;
      padding: 30px;
      white-space: pre-line;
      text-align: center;
    }

    .paper-body {
      font-size: 18px;
      line-height: 2;
      color: rgba(0,0,0,0.84);
      white-space: pre-line;
    }

    .paper-quote {
      margin-top: 30px;
      padding: 18px 20px;
      background: #F6F6F2;
      border-left: 2px solid #CBBDA5;
      font-size: 16px;
      line-height: 1.9;
      color: rgba(0,0,0,0.72);
    }

    .paper-note {
      margin-top: 34px;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 18px;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(0,0,0,0.58);
      white-space: pre-line;
    }

    @media (max-width: 1200px) {
      .navbar {
        flex-wrap: wrap;
        height: auto;
        padding: 12px 18px;
      }

      .nav-left {
        width: 100%;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 1100px) {
      .machines-layout {
        grid-template-columns: 1fr;
      }

      .step-menu {
        position: static;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .step-item {
        margin-bottom: 0;
        text-align: center;
      }

      .paper {
        min-height: auto;
        padding: 36px 24px 42px;
      }

      .paper-title {
        font-size: 28px;
      }

      .paper-body {
        font-size: 16px;
      }
    }

    @media (max-width: 768px) {
      .nav-search {
        width: 130px;
      }

      .nav-btn {
        padding: 7px 12px;
      }

      .machines-page {
        padding: 18px 14px 28px;
      }

      .machines-title {
        font-size: 28px;
      }

      .step-menu {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .paper-image {
        min-height: 190px;
      }

      .system-nav {
        gap: 10px;
        margin-left: 0;
        width: 100%;
        padding-top: 4px;
      }
    }
  </style>
</head>

<body>
  <div class="navbar">
    <div class="nav-left">
      <a href="/" class="nav-home" aria-label="Faeing 메인으로 이동">
        <img src="assets/images/logo.png" alt="Faeing" class="nav-logo">
        <span class="nav-brand">Faeing</span>
      </a>
      <div class="system-nav" id="systemTabs"></div>
    </div>

    <div class="nav-right">
      <input type="text" class="nav-search" placeholder="검색하거나 이동하세요…">
      <button class="nav-btn login-btn">Login</button>
      <button class="nav-btn signup-btn">Sign Up</button>
    </div>
  </div>

  <main class="machines-page">
    <section class="machines-heading">
      <h1 class="machines-title">고장진단</h1>
      <p class="machines-subtitle">증상을 먼저 선택하고, 원인이 숨어 있는 흐름을 순서대로 확인합니다.</p>
    </section>

    <section class="machines-layout">
      <aside class="step-menu" id="stepMenu"></aside>

      <section class="paper-wrap">
        <article class="paper">
          <div class="paper-head">
            <div class="paper-system" id="paperSystem">DIAGNOSIS FLOW</div>
            <h2 class="paper-title" id="paperTitle">시동 안 걸림 | 전체 흐름</h2>
            <div class="paper-sub" id="paperSub">시동 조건부터 전원, 크랭킹, 연료와 제어 흐름을 차례로 확인합니다.</div>
          </div>

          <div class="paper-image" id="paperImage">진단 흐름 영역</div>

          <div class="paper-body" id="paperBody"></div>

          <div class="paper-quote" id="paperQuote"></div>

          <div class="paper-note" id="paperNote"></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const contentData = {
      noStart: {
        label: "시동 안 걸림",
        eng: "NO START DIAGNOSIS",
        steps: {
          all: {
            title: "전체 흐름",
            subtitle: "시동 조건부터 전원, 크랭킹, 연료와 제어 흐름을 차례로 확인합니다.",
            imageText: "시동 조건 → 계기판 전원 → 크랭킹 여부 → 소리 구분 → 연료 / 제어 / 흡배기 확인",
            body:
`시동이 걸리지 않는 문제는 크게 세 갈래로 나눠 볼 수 있습니다.

첫째, 시동 조건이 맞지 않아 안전 회로가 막고 있는 경우입니다.
전후진 레버, PTO, 클러치, 좌석 스위치 조건을 먼저 확인합니다.

둘째, 전기가 스타트모터까지 제대로 도달하지 않는 경우입니다.
배터리, 단자, 접지, 퓨즈, 릴레이, 키 스위치, 스타트 신호를 순서대로 봅니다.

셋째, 엔진은 돌지만 연료나 제어 조건이 맞지 않아 연소가 시작되지 않는 경우입니다.
연료, 에어 혼입, 필터, ECU 전원, 센서, IMV, 예열, 흡배기 흐름을 확인합니다.`,
            quote: "시동 불량은 부품 하나보다 조건, 전원, 연료, 제어 흐름이 어디서 끊겼는지를 보는 문제입니다.",
            note: "현장에서는 가장 먼저 안전 조건을 보고, 그다음 계기판 전원과 크랭킹 소리로 큰 방향을 나누는 것이 좋습니다."
          },
          condition: {
            title: "시동 조건",
            subtitle: "안전 조건이 맞지 않으면 고장이 아니어도 시동 회로가 차단됩니다.",
            imageText: "전후진 중립 / PTO 꺼짐 / 클러치 밟음 / 좌석 스위치",
            body:
`시동 진단의 첫 단계는 부품이 아니라 조건입니다.

전후진 레버가 중립인지 확인합니다.
PTO가 꺼져 있는지 확인합니다.
클러치를 끝까지 밟았는지 확인합니다.
좌석 스위치나 안전 스위치가 적용된 기종이라면 해당 조건도 함께 확인합니다.

이 단계에서 조건이 맞지 않으면 스타트모터가 돌지 않는 것이 정상일 수 있습니다.`,
            quote: "고장이 아니라 조건 미충족일 수 있습니다.",
            note: "중립 스위치, 클러치 스위치, PTO 스위치는 오래 쓰면 접점 불량으로 실제 조건과 신호가 다를 수 있습니다."
          },
          panel: {
            title: "계기판 전원",
            subtitle: "키 ON 상태에서 전원이 살아 있는지 먼저 확인합니다.",
            imageText: "배터리 → 메인 퓨즈 → 키 스위치 → 계기판",
            body:
`키를 ON 했을 때 계기판이 들어오는지 확인합니다.

계기판이 아예 들어오지 않으면 배터리, 배터리 단자, 접지, 메인 퓨즈, 퓨저블 링크, 키 스위치 쪽을 먼저 봅니다.

계기판이 희미하거나 깜빡이면 전압은 있으나 전류가 부족하거나 접촉이 불안정할 가능성이 있습니다.

전기는 눈에 보이지 않기 때문에 어디까지 전압이 도달하는지 순서대로 확인해야 합니다.`,
            quote: "계기판은 전원 흐름의 첫 번째 신호입니다.",
            note: "배터리 전압만 보지 말고 시동 시 전압 강하, 단자 조임, 차체 접지를 함께 확인해야 합니다."
          },
          crank: {
            title: "크랭킹 소리",
            subtitle: "엔진이 도는지, 어떤 소리가 나는지로 방향을 나눕니다.",
            imageText: "아무 소리 없음 / 딸깍 / 따다다다 / 낑낑 / 정상 크랭킹",
            body:
`시동을 걸 때 엔진이 실제로 도는지 확인합니다.

아무 소리도 없으면 스타트 신호가 전달되지 않는 쪽을 봅니다.
딸깍 소리만 나면 릴레이나 마그네틱은 반응하지만 전류가 부족할 수 있습니다.
따다다다 소리는 배터리 전압이 순간적으로 무너질 때 자주 나타납니다.
낑낑거리며 약하게 돌면 배터리, 접지, 스타트모터, 엔진 저항을 함께 봅니다.

정상적으로 크랭킹되는데 시동이 안 걸리면 연료와 제어 흐름으로 넘어갑니다.`,
            quote: "소리는 고장 방향을 알려주는 현장 언어입니다.",
            note: "소리를 구분하면 배터리, 릴레이, 스타트모터, 연료 계통 중 어디부터 볼지 빠르게 좁힐 수 있습니다."
          },
          fuelControl: {
            title: "연료와 제어",
            subtitle: "크랭킹은 되는데 시동이 안 걸리면 연료, 예열, 센서, ECU 흐름을 봅니다.",
            imageText: "연료량 → 필터 → 에어 빼기 → 연료압 → ECU 전원 → 센서 신호",
            body:
`엔진이 정상적으로 도는데 시동이 걸리지 않으면 연료가 연소실까지 들어가는지 확인합니다.

연료량, 연료 필터, 수분 분리기, 에어 혼입, 저압 펌프 상태를 봅니다.

연기가 거의 없으면 연료가 들어가지 않거나 분사 명령이 없을 수 있습니다.
흰 연기가 나면 연료는 들어가지만 예열, 압축, 분사 상태 문제일 수 있습니다.
검은 연기가 나면 공기 부족, 흡기 막힘, EGR, 연소 불량을 의심합니다.

전자제어 기종은 ECU 전원, 접지, 크랭크각 센서, IMV, 에러코드도 함께 확인해야 합니다.`,
            quote: "엔진은 돌지만 시동이 안 걸리면 연료와 제어가 만나는 지점을 봐야 합니다.",
            note: "진단기가 있다면 크랭킹 중 엔진 회전수 신호, 연료압, 에러코드를 함께 확인하면 방향이 빨라집니다."
          }
        }
      },

      lowPower: {
        label: "출력 저하",
        eng: "LOW POWER DIAGNOSIS",
        steps: {
          all: {
            title: "전체 흐름",
            subtitle: "힘이 약할 때는 공기, 연료, 부하, 압축 흐름을 차례로 봅니다.",
            imageText: "공기 → 연료 → 부하 → 배기 → 압축",
            body:
`출력이 약한 증상은 단순히 엔진이 나빠졌다는 뜻이 아닙니다.

에어클리너가 막혀 공기가 부족할 수 있고,
연료 필터가 막혀 연료 공급이 약할 수 있습니다.
작업 부하가 과하거나 작업기 쪽 저항이 커진 경우도 출력 저하처럼 느껴집니다.

      paperSystemEl.textContent = system.eng;
      paperTitleEl.textContent = `${system.label} | ${page.title}`;
      paperSubEl.textContent = page.subtitle;
      paperImageEl.textContent = page.imageText;
      paperBodyEl.textContent = page.body;
      paperQuoteEl.textContent = page.quote;
      paperNoteEl.textContent = page.note;
    }

    function renderAll() {
      renderSystemTabs();
      renderStepMenu();
      renderPaper();
    }

    renderAll();
  </script>
</body>
</html>
