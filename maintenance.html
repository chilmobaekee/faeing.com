<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faeing | 관리</title>

  <meta name="description" content="Faeing 관리 페이지 - 일상 점검, 시즌 전 점검, 오일 관리, 유압 관리, 이력관리를 차분하게 따라가는 문서형 관리 구조입니다.">

  <meta property="og:title" content="Faeing | 관리">
  <meta property="og:description" content="농기계 관리 흐름을 차분하게 따라가는 문서형 관리 구조">
  <meta property="og:image" content="https://faeing.com/og-image.png">
  <meta property="og:url" content="https://faeing.com/maintenance.html">
  <meta property="og:type" content="website">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Times New Roman", serif;
      background: #f9faf7;
      color: #222;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font-family: inherit;
    }

    /* =========================
       상단바
    ========================= */
    .navbar {
      width: 100%;
      min-height: 56px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #F2F1EE;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .nav-home {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .nav-logo {
      height: 36px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }

    .nav-brand {
      font-size: 22px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .system-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      margin-left: 18px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .system-nav::-webkit-scrollbar {
      display: none;
    }

    .system-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: #111;
      padding: 4px 0;
      position: relative;
      flex-shrink: 0;
    }

    .system-nav .separator {
      opacity: 0.35;
      flex-shrink: 0;
    }

    .system-nav button.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -8px;
      height: 1.5px;
      background: #111;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-search {
      padding: 8px 14px;
      border: none;
      border-radius: 999px;
      background: rgba(0,0,0,0.04);
      font-size: 13px;
      color: #333;
      outline: none;
      width: 210px;
    }

    .nav-search::placeholder {
      color: rgba(0,0,0,0.35);
    }

    .nav-btn {
      border: none;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      transition: background 0.2s ease;
    }

    .login-btn {
      color: rgba(0,0,0,0.6);
    }

    .login-btn:hover {
      background: rgba(0,0,0,0.04);
    }

    .signup-btn {
      color: rgba(0,0,0,0.65);
      background: rgba(0,0,0,0.02);
    }

    .signup-btn:hover {
      background: rgba(0,0,0,0.06);
    }

    /* =========================
       관리 본문
    ========================= */
    .machines-page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 26px 22px 42px;
    }

    .machines-heading {
      margin-bottom: 20px;
    }

    .machines-title {
      font-size: 34px;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .machines-subtitle {
      font-size: 15px;
      color: rgba(0,0,0,0.62);
      line-height: 1.7;
    }

    .machines-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 24px;
      align-items: start;
    }

    .step-menu {
      background: #ECEFEC;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 16px;
      padding: 10px;
      position: sticky;
      top: 78px;
    }

    .step-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      padding: 14px 14px;
      border-radius: 12px;
      font-size: 16px;
      color: rgba(0,0,0,0.68);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      margin-bottom: 6px;
    }

    .step-item:last-child {
      margin-bottom: 0;
    }

    .step-item:hover {
      background: rgba(255,255,255,0.6);
      color: #111;
    }

    .step-item.active {
      background: #ffffff;
      color: #111;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      font-weight: 600;
    }

    .paper-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .paper {
      width: min(960px, 100%);
      min-height: 1180px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 14px 34px rgba(0,0,0,0.06);
      padding: 56px 60px 64px;
      position: relative;
    }

    .paper::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: linear-gradient(to right, #e5e5e0, #f5f5f2, #e5e5e0);
    }

    .paper-head {
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding-bottom: 18px;
      margin-bottom: 28px;
    }

    .paper-system {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.42);
      margin-bottom: 8px;
    }

    .paper-title {
      font-size: 34px;
      line-height: 1.34;
      letter-spacing: -0.02em;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .paper-sub {
      font-size: 15px;
      color: rgba(0,0,0,0.56);
      line-height: 1.8;
    }

    .paper-image {
      width: 100%;
      min-height: 230px;
      margin: 28px 0 30px;
      border: 1px solid rgba(0,0,0,0.08);
      background: linear-gradient(135deg, #f3f4f1, #e8ece8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,0,0,0.50);
      font-size: 18px;
      line-height: 1.8;
      padding: 30px;
      white-space: pre-line;
      text-align: center;
    }

    .paper-body {
      font-size: 18px;
      line-height: 2;
      color: rgba(0,0,0,0.84);
      white-space: pre-line;
    }

    .paper-quote {
      margin-top: 30px;
      padding: 18px 20px;
      background: #F6F6F2;
      border-left: 2px solid #CBBDA5;
      font-size: 16px;
      line-height: 1.9;
      color: rgba(0,0,0,0.72);
    }

    .paper-note {
      margin-top: 34px;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 18px;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(0,0,0,0.58);
      white-space: pre-line;
    }

    .login-panel {
      margin-top: 28px;
      padding: 24px;
      background: #F6F6F2;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
    }

    .login-panel-title {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 400;
    }

    .login-panel-text {
      font-size: 16px;
      line-height: 1.8;
      color: rgba(0,0,0,0.66);
      margin-bottom: 18px;
    }

    .login-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .main-action,
    .sub-action {
      border: none;
      border-radius: 999px;
      padding: 11px 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .main-action {
      background: #222;
      color: #fff;
    }

    .sub-action {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.12);
      color: rgba(0,0,0,0.72);
    }

    .history-sample {
      margin-top: 22px;
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }

    .history-sample th,
    .history-sample td {
      border: 1px solid rgba(0,0,0,0.08);
      padding: 10px;
      text-align: left;
    }

    .history-sample th {
      background: #F2F1EE;
      font-weight: 600;
    }

    @media (max-width: 1200px) {
      .navbar {
        flex-wrap: wrap;
        height: auto;
        padding: 12px 18px;
      }

      .nav-left {
        width: 100%;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 1100px) {
      .machines-layout {
        grid-template-columns: 1fr;
      }

      .step-menu {
        position: static;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .step-item {
        margin-bottom: 0;
        text-align: center;
      }

      .paper {
        min-height: auto;
        padding: 36px 24px 42px;
      }

      .paper-title {
        font-size: 28px;
      }

      .paper-body {
        font-size: 16px;
      }
    }

    @media (max-width: 768px) {
      .nav-search {
        width: 130px;
      }

      .nav-btn {
        padding: 7px 12px;
      }

      .machines-page {
        padding: 18px 14px 28px;
      }

      .machines-title {
        font-size: 28px;
      }

      .step-menu {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .paper-image {
        min-height: 190px;
      }

      .system-nav {
        gap: 10px;
        margin-left: 0;
        width: 100%;
        padding-top: 4px;
      }
    }
  </style>
</head>

<body>
  <div class="navbar">
    <div class="nav-left">
      <a href="/" class="nav-home" aria-label="Faeing 메인으로 이동">
        <img src="assets/images/logo.png" alt="Faeing" class="nav-logo">
        <span class="nav-brand">Faeing</span>
      </a>
      <div class="system-nav" id="systemTabs"></div>
    </div>

    <div class="nav-right">
      <input type="text" class="nav-search" placeholder="검색하거나 이동하세요…">
      <button class="nav-btn login-btn" onclick="showLoginNotice()">Login</button>
      <button class="nav-btn signup-btn" onclick="showLoginNotice()">Sign Up</button>
    </div>
  </div>

  <main class="machines-page">
    <section class="machines-heading">
      <h1 class="machines-title">관리</h1>
      <p class="machines-subtitle">관리 방법은 누구나 볼 수 있고, 내 기계 이력은 로그인 후 안전하게 기록합니다.</p>
    </section>

    <section class="machines-layout">
      <aside class="step-menu" id="stepMenu"></aside>

      <section class="paper-wrap">
        <article class="paper">
          <div class="paper-head">
            <div class="paper-system" id="paperSystem">MAINTENANCE FLOW</div>
            <h2 class="paper-title" id="paperTitle">일상 점검 | 전체 흐름</h2>
            <div class="paper-sub" id="paperSub">작업 전, 작업 중, 작업 후의 기본 관리 흐름입니다.</div>
          </div>

          <div class="paper-image" id="paperImage">관리 흐름 영역</div>

          <div class="paper-body" id="paperBody"></div>

          <div class="paper-quote" id="paperQuote"></div>

          <div class="paper-note" id="paperNote"></div>

          <div id="extraArea"></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const contentData = {
      daily: {
        label: "일상 점검",
        eng: "DAILY MAINTENANCE",
        steps: {
          all: {
            title: "전체 흐름",
            subtitle: "작업 전, 작업 중, 작업 후의 기본 관리 흐름입니다.",
            imageText: "작업 전 → 작업 중 → 작업 후 → 기록",
            body:
`일상 점검은 고장을 막는 가장 작은 습관입니다.

농기계는 작업 환경이 거칠고 먼지, 진동, 열, 습기에 계속 노출됩니다.
하루 작업 전후의 작은 확인만으로도 큰 고장을 줄일 수 있습니다.

일상 점검은 어렵게 생각할 필요가 없습니다.
오일, 냉각수, 누유, 소리, 진동, 온도, 이물질을 반복해서 확인하는 것입니다.`,
            quote: "관리는 큰 수리보다 작은 반복에서 시작됩니다.",
            note: "처음에는 완벽한 점검표보다 매일 반복할 수 있는 짧은 점검 루틴이 더 중요합니다."
          },
          before: {
            title: "작업 전",
            subtitle: "작업을 시작하기 전에 기본 상태를 확인합니다.",
            imageText: "오일 / 냉각수 / 연료 / 누유 / 타이어 / 안전장치",
            body:
`작업 전에는 기계가 오늘 일을 시작할 준비가 되었는지 확인합니다.

엔진오일량을 확인합니다.
냉각수량을 확인합니다.
연료량과 연료 누유를 확인합니다.
유압오일 누유와 호스 상태를 확인합니다.
타이어 공기압과 볼트 풀림을 확인합니다.

시동 후에는 계기판 경고등과 소리를 확인합니다.`,
            quote: "작업 전 점검은 오늘의 고장을 미리 줄이는 시간입니다.",
            note: "작업 전 3분 점검이 현장 중단 시간을 크게 줄일 수 있습니다."
          },
          during: {
            title: "작업 중",
            subtitle: "작업 중에는 소리, 진동, 온도, 힘 변화를 관찰합니다.",
            imageText: "소리 / 진동 / 온도 / 힘 / 연기",
            body:
`작업 중에는 기계가 보내는 신호를 봅니다.

평소와 다른 소리가 나는지 확인합니다.
진동이 커졌는지 확인합니다.
냉각수 온도와 계기판 경고등을 봅니다.
힘이 갑자기 약해졌는지 확인합니다.
배기 연기가 평소와 달라졌는지 봅니다.

기계는 갑자기 멈춘 것 같지만, 그 전부터 신호를 보내는 경우가 많습니다.`,
            quote: "작업 중 관찰은 고장 전 신호를 잡는 일입니다.",
            note: "소리와 진동이 커지는 상태에서는 계속 밀어붙이지 말고 멈춰서 확인하는 것이 좋습니다."
          },
          after: {
            title: "작업 후",
            subtitle: "작업이 끝난 뒤 청소와 이물질 제거, 다음 작업 준비를 합니다.",
            imageText: "청소 / 먼지 제거 / 이물질 제거 / 누유 재확인",
            body:
`작업 후 관리는 다음 고장을 줄이는 시간입니다.

라디에이터와 에어클리너 주변 먼지를 확인합니다.
작업기에 감긴 풀, 끈, 비닐, 흙을 제거합니다.
누유가 새로 생겼는지 확인합니다.
볼트 풀림이나 커버 손상을 확인합니다.

작업 후 발견한 이상은 바로 기록해 두는 것이 좋습니다.`,
            quote: "작업 후 정리는 다음 작업의 시작입니다.",
            note: "청소는 외관 관리가 아니라 열, 회전, 흡입, 누유를 확인하는 진단 과정입니다."
          }
        }
      },

      season: {
        label: "시즌 전 점검",
        eng: "SEASONAL MAINTENANCE",
        steps: {
          all: {
            title: "전체 흐름",
            subtitle: "시즌 한 달 전 전체 상태를 확인해 작업 중단을 줄입니다.",
            imageText: "시즌 한 달 전 → 기본 소모품 → 배터리 → 벨트/호스 → 시운전",
            body:
`시즌 전 점검은 작업이 바빠지기 전에 고장을 미리 줄이는 준비입니다.

농번기에는 작은 고장도 큰 손실로 이어집니다.
따라서 시즌이 시작되기 전 오일, 필터, 배터리, 벨트, 호스, 냉각, 유압, 작업기 상태를 미리 봐야 합니다.

시즌 전 점검은 수리보다 예방에 가깝습니다.`,
            quote: "농번기 고장은 시즌 전에 이미 준비되었을 수 있습니다.",
            note: "시즌 한 달 전 점검을 기준으로 잡으면 부품 준비와 정비 일정 조정이 쉬워집니다."
          },
          engine: {
            title: "엔진 기본",
            subtitle: "엔진오일, 연료필터, 에어클리너, 냉각 상태를 봅니다.",
            imageText: "엔진오일 / 연료필터 / 에어클리너 / 냉각수",
            body:
`엔진은 시즌 전 가장 먼저 확인해야 할 중심입니다.

엔진오일량과 오염 상태를 확인합니다.
연료필터와 수분 분리기를 확인합니다.
에어클리너 막힘을 확인합니다.
냉각수량과 라디에이터 막힘을 확인합니다.

시동 후에는 공회전 상태, 배기 연기, 이상 소리를 함께 봅니다.`,
            quote: "엔진 기본이 흔들리면 시즌 전체가 흔들립니다.",
            note: "터보 장착 기종은 시동 후와 작업 후 2~3분 정도 안정 운전을 해주는 습관이 좋습니다."
          },
          battery: {
            title: "배터리 / 전기",
            subtitle: "시동성과 전원 흐름을 미리 확인합니다.",
            imageText: "배터리 / 단자 / 접지 / 퓨즈 / 경고등",
            body:
`배터리는 시즌 초 시동 불량의 대표 원인입니다.

배터리 전압을 확인합니다.
단자 부식과 조임 상태를 확인합니다.
차체 접지선을 확인합니다.

              <button class="main-action" onclick="showLoginNotice()">로그인하기</button>
              <button class="sub-action" onclick="showLoginNotice()">회원가입</button>
            </div>
          </div>
        `;
        return;
      }

      if (system.loginRequired && isLoggedIn) {
        extraAreaEl.innerHTML = `
          <div class="login-panel">
            <h3 class="login-panel-title">내 관리 이력 예시</h3>
            <p class="login-panel-text">실제 로그인 기능을 연결하면 이 영역에 사용자의 기계별 관리 기록이 표시됩니다.</p>
            <table class="history-sample">
              <thead>
                <tr>
                  <th>관리일자</th>
                  <th>기대번호</th>
                  <th>작업내용</th>
                  <th>구분</th>
                  <th>다음 예정일</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>2026-04-26</td>
                  <td>FAE-001</td>
                  <td>엔진오일 및 필터 확인</td>
                  <td>점검</td>
                  <td>2026-10-26</td>
                </tr>
              </tbody>
            </table>
          </div>
        `;
      }
    }

    function showLoginNotice() {
      alert("현재는 로그인 화면 연결 전 단계입니다. 다음 단계에서 Firebase 로그인 또는 자체 로그인으로 연결할 수 있습니다.");
    }

    function renderAll() {
      renderSystemTabs();
      renderStepMenu();
      renderPaper();

    renderAll();
  </script>
