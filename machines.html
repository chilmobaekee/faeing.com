<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faeing | 구조원리</title>

  <meta name="description" content="Faeing 구조원리 페이지 - 전기, 동력, 유압, 조향의 흐름을 차분하게 읽어가는 문서형 구조입니다.">

  <meta property="og:title" content="Faeing | 구조원리">
  <meta property="og:description" content="농기계의 구조원리를 차분하게 읽어가는 문서형 구조">
  <meta property="og:image" content="https://faeing.com/og-image.png">
  <meta property="og:url" content="https://faeing.com/machines.html">
  <meta property="og:type" content="website">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Times New Roman", serif;
      background: #f9faf7;
      color: #222;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    /* =========================
       상단바
    ========================= */
    .navbar {
      width: 100%;
      height: 56px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #F2F1EE;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      gap: 18px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .nav-logo {
      height: 36px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }

    .nav-brand {
      font-size: 22px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .system-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      margin-left: 18px;
      overflow-x: hidden;
    }

    .system-nav button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: #111;
      padding: 4px 0;
      position: relative;
      flex-shrink: 0;
    }

    .system-nav .separator {
      opacity: 0.35;
      flex-shrink: 0;
    }

    .system-nav button.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -8px;
      height: 1.5px;
      background: #111;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-search {
      padding: 8px 14px;
      border: none;
      border-radius: 999px;
      background: rgba(0,0,0,0.04);
      font-size: 13px;
      color: #333;
      outline: none;
      width: 210px;
    }

    .nav-search::placeholder {
      color: rgba(0,0,0,0.35);
    }

    .nav-btn {
      border: none;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      transition: background 0.2s ease;
    }

    .login-btn {
      color: rgba(0,0,0,0.6);
    }

    .login-btn:hover {
      background: rgba(0,0,0,0.04);
    }

    .signup-btn {
      color: rgba(0,0,0,0.65);
      background: rgba(0,0,0,0.02);
    }

    .signup-btn:hover {
      background: rgba(0,0,0,0.06);
    }

    /* =========================
       구조원리 본문
    ========================= */
    .machines-page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 26px 22px 42px;
    }

    .machines-heading {
      margin-bottom: 20px;
    }

    .machines-title {
      font-size: 34px;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .machines-subtitle {
      font-size: 15px;
      color: rgba(0,0,0,0.62);
      line-height: 1.7;
    }

    /* 하얀 설명 칸 */
    .intro-banner {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 22px;
      font-size: 15px;
      color: rgba(0,0,0,0.62);
      line-height: 1.7;
    }

    .machines-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* 왼쪽 단계 메뉴 */
    .step-menu {
      background: #ECEFEC;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 16px;
      padding: 10px;
      position: sticky;
      top: 78px;
    }

    .step-item {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      padding: 14px 14px;
      border-radius: 12px;
      font-size: 16px;
      color: rgba(0,0,0,0.68);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      margin-bottom: 6px;
    }

    .step-item:last-child {
      margin-bottom: 0;
    }

    .step-item:hover {
      background: rgba(255,255,255,0.6);
      color: #111;
    }

    .step-item.active {
      background: #ffffff;
      color: #111;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      font-weight: 600;
    }

    /* 오른쪽 문서 */
    .paper-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .paper {
      width: min(960px, 100%);
      min-height: 1180px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 14px 34px rgba(0,0,0,0.06);
      padding: 56px 60px 64px;
      position: relative;
    }

    .paper::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: linear-gradient(to right, #e5e5e0, #f5f5f2, #e5e5e0);
    }

    .paper-head {
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding-bottom: 18px;
      margin-bottom: 28px;
    }

    .paper-system {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.42);
      margin-bottom: 8px;
    }

    .paper-title {
      font-size: 34px;
      line-height: 1.34;
      letter-spacing: -0.02em;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .paper-sub {
      font-size: 15px;
      color: rgba(0,0,0,0.56);
      line-height: 1.8;
    }

    .paper-image {
      width: 100%;
      height: 300px;
      margin: 28px 0 30px;
      border: 1px solid rgba(0,0,0,0.08);
      background: linear-gradient(135deg, #f3f4f1, #e8ece8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,0,0,0.38);
      font-size: 18px;
      overflow: hidden;
    }

    .paper-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .paper-body {
      font-size: 18px;
      line-height: 2;
      color: rgba(0,0,0,0.84);
      white-space: pre-line;
    }

    .paper-quote {
      margin-top: 30px;
      padding: 18px 20px;
      background: #F6F6F2;
      border-left: 2px solid #CBBDA5;
      font-size: 16px;
      line-height: 1.9;
      color: rgba(0,0,0,0.72);
    }

    .paper-note {
      margin-top: 34px;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 18px;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(0,0,0,0.58);
    }

    @media (max-width: 1200px) {
      .navbar {
        flex-wrap: wrap;
        height: auto;
        padding: 12px 18px;
      }

      .nav-left {
        width: 100%;
      }

      .system-nav {
        margin-left: 10px;
      }
    }

    @media (max-width: 1100px) {
      .machines-layout {
        grid-template-columns: 1fr;
      }

      .step-menu {
        position: static;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .step-item {
        margin-bottom: 0;
        text-align: center;
      }

      .paper {
        min-height: auto;
        padding: 36px 24px 42px;
      }

      .paper-title {
        font-size: 28px;
      }

      .paper-body {
        font-size: 16px;
      }
    }

    @media (max-width: 768px) {
      .nav-search {
        width: 130px;
      }

      .nav-btn {
        padding: 7px 12px;
      }

      .machines-page {
        padding: 18px 14px 28px;
      }

      .machines-title {
        font-size: 28px;
      }

      .step-menu {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .paper-image {
        height: 220px;
      }

      .intro-banner {
        padding: 16px 18px;
      }
    }
  </style>
</head>

<body>
  <div class="navbar">
    <div class="nav-left">
      <img src="assets/images/logo.png" alt="Faeing" class="nav-logo">
      <span class="nav-brand">Faeing</span>
      <div class="system-nav" id="systemTabs"></div>
    </div>

    <div class="nav-right">
      <input type="text" class="nav-search" placeholder="검색하거나 이동하세요…">
      <button class="nav-btn login-btn">Login</button>
      <button class="nav-btn signup-btn">Sign Up</button>
    </div>
  </div>

  <main class="machines-page">
    <section class="machines-heading">
      <h1 class="machines-title">구조원리</h1>
      <p class="machines-subtitle">전체를 먼저 보고, 발생과 전달을 지나, 마지막 사용 단계까지 차분하게 읽어갑니다.</p>
    </section>

    <section class="intro-banner">
      농기계를 한 번에 다 보는 것이 아니라, 흐름을 차분하게 읽어가는 문서형 구조입니다.
    </section>

    <section class="machines-layout">
      <aside class="step-menu" id="stepMenu"></aside>

      <section class="paper-wrap">
        <article class="paper">
          <div class="paper-head">
            <div class="paper-system" id="paperSystem">ELECTRICAL SYSTEM</div>
            <h2 class="paper-title" id="paperTitle">전기 | 전체 시스템</h2>
            <div class="paper-sub" id="paperSub">전기 시스템 전체 흐름을 한 장의 문서처럼 정리합니다.</div>
          </div>

          <div class="paper-image" id="paperImage">대표 이미지 영역</div>
          <div class="paper-body" id="paperBody"></div>
          <div class="paper-quote" id="paperQuote"></div>
          <div class="paper-note" id="paperNote"></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const contentData = {
      electric: {
        label: "전기",
        eng: "ELECTRICAL SYSTEM",
        steps: {
          all: {
            title: "전체 시스템",
            subtitle: "전기 시스템 전체 흐름을 한 장의 문서처럼 정리합니다.",
            image: "",
            imageText: "전기 전체 시스템 이미지",
            body:
`전기는 농기계에서 가장 먼저 조건을 만들고,
다른 시스템이 움직일 수 있도록 시작을 준비하는 흐름입니다.

배터리에서 출발한 전원은
퓨즈, 키 스위치, 릴레이, 각종 안전장치와 배선을 지나
스타터, 센서, 계기판, 솔레노이드까지 이어집니다.

전기는 눈에 잘 보이지 않기 때문에
증상만 보고 판단하면 놓치는 경우가 많습니다.

따라서 전기는
어디가 끊어졌는가,
어디까지 전압이 도달했는가,
입력과 출력이 이어지는가를
차례대로 보는 것이 중요합니다.`,
            quote: "전기는 보이지 않지만, 흐름은 반드시 흔적을 남깁니다.",
            note: "현장에서는 부품을 바로 바꾸기보다 먼저 전압, 접지, 입력, 출력의 흐름을 확인하는 것이 훨씬 중요합니다."
          },
          generate: {
            title: "발생",
            subtitle: "전기의 시작점과 기본 전원 형성 단계입니다.",
            image: "",
            imageText: "배터리 / 발전기 이미지",
            body:
`전기의 발생은 배터리와 발전기에서 시작됩니다.

배터리는 시동 전 기본 전원을 공급하고,
발전기는 엔진이 작동한 뒤 시스템 전체 전원을 유지하거나 충전합니다.

전기 문제가 생기면
가장 먼저 전압이 충분한지,
접지 상태가 안정적인지,
충전이 제대로 되는지를 확인해야 합니다.

발생 단계가 약하면
뒤쪽 릴레이나 센서가 멀쩡해 보여도
전체 시스템은 흔들릴 수 있습니다.`,
            quote: "전기가 약하면 뒤가 멀쩡해 보여도 전체가 흔들립니다.",
            note: "배터리 단자 부식, 접지 불량, 충전 부족은 가장 먼저 의심할 수 있는 기본 원인입니다."
          },
          transfer: {
            title: "전달",
            subtitle: "전압과 신호가 배선과 접점을 통해 이동하는 과정입니다.",
            image: "",
            imageText: "배선 / 릴레이 / 퓨즈 이미지",
            body:
`전기의 전달은 배선, 커넥터, 퓨즈, 릴레이, 스위치를 통해 이뤄집니다.

이 단계에서는 단선만 보는 것이 아니라
접촉불량, 전압강하, 부식, 진동에 의한 순간 단절까지 함께 봐야 합니다.

전달 구간이 무너지면
가끔 된다,
열 받으면 안 된다,
흔들리면 꺼진다 같은 증상이 자주 나타납니다.

즉 전기의 전달은
이어져 있느냐보다
안정적으로 이어져 있느냐가 핵심입니다.`,
            quote: "전기는 연결보다 접촉의 품질이 더 중요할 때가 많습니다.",
            note: "현장에서는 커넥터, 릴레이 접점, 퓨즈홀더, 하네스 꺾임 구간을 함께 보는 습관이 중요합니다."
          },
          use: {
            title: "사용",
            subtitle: "전기가 실제 작동으로 이어지는 최종 단계입니다.",
            image: "",
            imageText: "스타터 / 계기판 / 솔밸브 이미지",
            body:
`전기의 사용 단계는
스타터 모터가 돌고,
계기판이 점등되고,
센서가 신호를 보내고,
솔레노이드와 액추에이터가 작동하는 자리입니다.

사용 단계의 증상은 분명하게 보이지만
원인은 앞단의 발생 또는 전달에 숨어 있는 경우가 많습니다.

그래서 시동 불량, 계기판 이상, 센서 오작동이 보이면
부품만 바로 바꾸기보다
그 부품까지 전기 흐름이 정상적으로 도달했는지를 먼저 확인해야 합니다.`,
            quote: "증상은 마지막에서 보이고, 원인은 그 앞에 숨어 있을 수 있습니다.",
            note: "보이는 부품 하나만 보는 습관보다 그 부품까지 도달한 흐름 전체를 보는 습관이 더 정확한 진단으로 이어집니다."
          }
        }
      },

      power: {
        label: "동력",
        eng: "POWER SYSTEM",
        steps: {
          all: {
            title: "전체 시스템",
            subtitle: "엔진에서 시작된 힘이 작업으로 이어지는 흐름입니다.",
            image: "",
            imageText: "동력 전체 시스템 이미지",
            body:
`동력 시스템은 엔진에서 만들어진 힘이
클러치, 변속기, 샤프트, 차축, PTO를 지나
주행과 작업으로 이어지는 흐름입니다.

농기계의 많은 문제는
힘이 아예 없는 것이 아니라
힘이 제대로 전달되지 않는 데서 생기기도 합니다.

따라서 동력은
발생된 힘의 크기,
전달 과정의 손실,
최종 사용처의 부하를 함께 봐야 합니다.`,
            quote: "동력은 힘 자체보다 흐름 전체로 봐야 분명해집니다.",
            note: "겉으로는 같은 출력 저하처럼 보여도 원인은 엔진, 클러치, 변속기, PTO 쪽으로 각각 다를 수 있습니다."
          },
          generate: {
            title: "발생",
            subtitle: "엔진이 힘을 만들어내는 구간입니다.",
            image: "",
            imageText: "엔진 / 연소 시스템 이미지",
            body:
`동력의 발생은 엔진 연소에서 시작됩니다.

흡입, 압축, 연소, 배기의 흐름이 안정적이어야
정상적인 토크와 출력을 만들 수 있습니다.

출력이 약하다면
연료, 공기, 압축, 냉각, 배기 상태를 먼저 봐야 합니다.

동력은 발생 단계에서 이미 흔들릴 수 있고
그 결과가 전달과 사용 단계에서 더 크게 드러납니다.`,
            quote: "엔진이 약하면 뒤의 모든 단계가 약해집니다.",
            note: "냉각, 필터, 연료, 흡기, 배기 같은 기초 상태를 먼저 보는 습관이 중요합니다."
          },
          transfer: {
            title: "전달",
            subtitle: "발생한 힘이 손실 없이 이동하는 구간입니다.",
            image: "",
            imageText: "클러치 / 변속기 / 샤프트 이미지",
            body:
`동력 전달은 클러치, 변속기, 기어, 샤프트, 디퍼렌셜 등을 통해 이뤄집니다.

이 단계에서는 마모, 슬립, 유격, 베어링 손상, 기어 이상이 문제를 만듭니다.

힘은 있는데 앞으로 안 나가거나,
부하를 걸면 힘이 빠지는 증상은

    };

    let currentSystem = "electric";
    let currentStep = "all";

    const systemTabsEl = document.getElementById("systemTabs");
    const stepMenuEl = document.getElementById("stepMenu");
    const paperSystemEl = document.getElementById("paperSystem");
    const paperTitleEl = document.getElementById("paperTitle");
    const paperSubEl = document.getElementById("paperSub");
    const paperImageEl = document.getElementById("paperImage");
    const paperBodyEl = document.getElementById("paperBody");
    const paperQuoteEl = document.getElementById("paperQuote");
    const paperNoteEl = document.getElementById("paperNote");

    function renderSystemTabs() {
      systemTabsEl.innerHTML = "";
      const keys = Object.keys(contentData);

      keys.forEach((key, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = currentSystem === key ? "active" : "";
        btn.textContent = contentData[key].label;
        btn.onclick = () => {
          currentSystem = key;
          currentStep = "all";
          renderAll();
        };
        systemTabsEl.appendChild(btn);

        if (index < keys.length - 1) {
          const sep = document.createElement("span");
          sep.className = "separator";
          sep.textContent = "/";
          systemTabsEl.appendChild(sep);
        }
      });
    }

    function renderStepMenu() {
      stepMenuEl.innerHTML = "";

      Object.keys(stepNames).forEach((key) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "step-item" + (key === currentStep ? " active" : "");
        btn.textContent = stepNames[key];
        btn.onclick = () => {
          currentStep = key;
          renderAll();
        };
        stepMenuEl.appendChild(btn);
      });
    }

    function renderPaper() {
      const system = contentData[currentSystem];
      const page = system.steps[currentStep];

      paperSystemEl.textContent = system.eng;
      paperTitleEl.textContent = `${system.label} | ${page.title}`;
      paperSubEl.textContent = page.subtitle;
      paperBodyEl.textContent = page.body;
      paperQuoteEl.textContent = page.quote;
      paperNoteEl.textContent = page.note;

      if (page.image) {
        paperImageEl.innerHTML = `<img src="${page.image}" alt="${system.label} ${page.title}">`;
      } else {
        paperImageEl.textContent = page.imageText;
      }
    }

    function renderAll() {
      renderSystemTabs();
      renderStepMenu();
      renderPaper();
    }
